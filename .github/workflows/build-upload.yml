# Publishes compiled skills + registry.json to the orphan branch `build` (root contains `skills/`).
# Optional: point GitHub Pages at branch `build` / root if you want https://<owner>.github.io/<repo>/skills/...
name: Build skills and publish to build branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-branch
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and push to build branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # yarn build runs compile/bundle/strip and ends with build:registry (generate-registry.mjs).
      - name: Build all skills and generate registry
        run: yarn build
        env:
          # raw.githubusercontent.com branch ref (see https://docs.github.com/en/repositories/working-with-files/using-files/getting-permanent-links-to-files)
          SKILLS_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/build

      - name: Prepare publish directory
        run: |
          mkdir -p gh-pages-out
          mv skills gh-pages-out/

      - name: Push to build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-out
          publish_branch: build
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: update build branch [skip ci]'
